name: Deploy to EC2

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create application.yaml from secrets
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.APPLICATION_YAML }}" > src/main/resources/application.yaml

      - name: Create firebase-adminsdk.json from secrets
        run: |
          mkdir -p src/main/resources
          printf '%s' "${{ secrets.FIREBASE_ADMIN_SDK }}" > src/main/resources/firebase-adminsdk.json

      - name: Insecure Docker Repository
        run: |
          echo "{\"insecure-registries\": [\"${{ secrets.DOCKER_REGISTRY }}\"]}" | sudo tee /etc/docker/daemon.json > /dev/null
          sudo systemctl daemon-reload
          sudo systemctl restart docker

      - name: Build and push Docker image
        run: |
          docker build -t backend .
          docker tag backend ${{ secrets.DOCKER_REGISTRY }}/backend:latest
          docker push ${{ secrets.DOCKER_REGISTRY }}/backend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_REGISTRY }}/backend:latest
            docker stop backend || true
            docker rm backend || true
            docker run -d --name backend -p 8080:8080 ${{ secrets.DOCKER_REGISTRY }}/backend:latest